name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    name: Java ${{ matrix.java }} / Clojure ${{ matrix.clojure }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17, 21]
        clojure: ["1.11", "1.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: project.clj
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          lein: 2.11.2
      - name: Run tests
        run: |
          if [[ "${{ matrix.clojure }}" == "1.12" ]]; then
            lein with-profile +clojure-1.12 test
          else
            lein test
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: project.clj
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          lein: 2.11.2
          clj-kondo: 2026.05.25
      - run: lein cljfmt check
      - run: lein check
      - run: clj-kondo --lint src test
      - run: lein jar
      - run: lein pom
      - name: Scan dependencies
        uses: google/osv-scanner-action/osv-scanner-action@8dc09193bb540e09b23da07ad7e30bd33bf87018 # v2.3.8
        with:
          scan-args: |-
            --no-ignore
            --no-resolve
            ./

  publish:
    needs: [test, quality]
    runs-on: ubuntu-latest
    environment: clojars
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: project.clj
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          lein: 2.11.2
      - name: Verify tag and publish
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: |
          version=$(sed -n 's/^(defproject [^ ]* "\([^"]*\)".*/\1/p' project.clj)
          test "v${version}" = "${GITHUB_REF_NAME}"
          lein deploy clojars
