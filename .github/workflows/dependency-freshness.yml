name: Dependency freshness

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  antq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          clojure: 1.12.5
      - name: Report outdated dependencies
        run: |
          output=$(clojure -Sdeps '{:deps {com.github.liquidz/antq {:mvn/version "2.11.1276"}}}' \
            -M -m antq.core --skip=github-action \
            '--error-format=::error file={{file}}::{{name}} {{version}} -> {{latest-version}}')
          if [[ -n "$output" ]]; then
            echo "$output"
            exit 1
          fi
