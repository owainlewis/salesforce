name: Salesforce live smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: salesforce-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: project.clj
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          lein: 2.11.2
      - name: Run read-only org smoke test
        env:
          SALESFORCE_LOGIN_HOST: ${{ secrets.SALESFORCE_LOGIN_HOST }}
          SALESFORCE_CLIENT_ID: ${{ secrets.SALESFORCE_CLIENT_ID }}
          SALESFORCE_CLIENT_SECRET: ${{ secrets.SALESFORCE_CLIENT_SECRET }}
        run: |
          test -n "$SALESFORCE_LOGIN_HOST"
          test -n "$SALESFORCE_CLIENT_ID"
          test -n "$SALESFORCE_CLIENT_SECRET"
          lein test :only salesforce.live-smoke-test/live-read-only-smoke-test
